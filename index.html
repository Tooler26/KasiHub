<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasiHub | South Africa's Local Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --kasi-green: #2ecc71; 
            --kasi-dark: #0f0f0f; 
            --sidebar: #121212;
            --card: #1e1e1e;
        }

        body { 
            background: var(--kasi-dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
        }

        /* 1. SIDEBAR NAVIGATION */
        nav { 
            width: 260px; 
            height: 100vh; 
            background: var(--sidebar); 
            position: fixed; 
            border-right: 1px solid #222; 
            padding: 20px; 
            overflow-y: auto; 
        }

        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            text-align: center;
            letter-spacing: -1px;
        }

        .nav-link { 
            padding: 12px 15px; 
            display: flex;
            align-items: center;
            color: #bbb; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            transition: 0.3s ease; 
        }

        .nav-link i { margin-right: 15px; width: 20px; text-align: center; }

        .nav-link:hover, .active { 
            background: var(--kasi-green); 
            color: black; 
            font-weight: bold;
        }

        .section-label { 
            font-size: 11px; 
            color: #555; 
            margin: 25px 0 10px 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        /* 2. MAIN CONTENT AREA */
        main { 
            margin-left: 260px; 
            width: 100%; 
            padding: 30px; 
        }

        .page-content { display: none; animation: fadeIn 0.5s ease; }
        .active-page { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 3. VIDEO & CONTENT GRID */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .v-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            transition: 0.3s;
        }

        .v-card:hover { transform: scale(1.02); border-color: var(--kasi-green); }

        .thumb { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .details { padding: 15px; }
        .kasi-badge { 
            font-size: 10px; 
            background: #333; 
            padding: 3px 8px; 
            border-radius: 4px; 
            color: var(--kasi-green);
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            nav { width: 70px; padding: 10px; }
            nav span, .section-label, .logo span { display: none; }
            main { margin-left: 70px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Kasi<span>Hub</span></div>
    
    <a href="#" class="nav-link active" onclick="showPage('home')"><i class="fa fa-home"></i> <span>Home</span></a>
    <a href="#" class="nav-link" onclick="showPage('shorts')"><i class="fa fa-bolt"></i> <span>Shorts</span></a>
    
    <div class="section-label">Active Kasies</div>
    <div id="kasi-tabs">
        <a href="#" class="nav-link">📍 <span>Parys</span></a>
        <a href="#" class="nav-link">📍 <span>De Deur</span></a>
        <a href="#" class="nav-link">📍 <span>Roshnee</span></a>
    </div>

    <div class="section-label">Explore</div>
    <a href="#" class="nav-link" onclick="showPage('market')"><i class="fa fa-shopping-basket"></i> <span>Marketplace</span></a>
    <a href="#" class="nav-link" onclick="showPage('sports')"><i class="fa fa-football"></i> <span>Sports News</span></a>
    <a href="#" class="nav-link" onclick="showPage('politics')"><i class="fa fa-landmark"></i> <span>Politics</span></a>
    <a href="#" class="nav-link" onclick="showPage('finance')"><i class="fa fa-chart-line"></i> <span>Finance & Tech</span></a>
</nav>

<main>
    <section id="home" class="page-content active-page">
        <h1>Trending Near You</h1>
        <div class="grid">
            <div class="v-card">
                <div class="thumb"><i class="fa fa-play fa-2x"></i></div>
                <div class="details">
                    <span class="kasi-badge">Parys</span>
                    <h4 style="margin:10px 0;">Community Braai Day 2024</h4>
                    <p style="color:#777; font-size:13px;">1.2M views • 1 day ago</p>
                </div>
            </div>
            </div>
    </section>

    <section id="market" class="page-content">
        <h1>Kasi Marketplace</h1>
        <p>Buy and sell locally within your Kasi.</p>
        <div class="grid" id="market-items">
            </div>
    </section>

    <section id="sports" class="page-content">
        <h1>Local Sports Central</h1>
        <div style="display:flex; gap:30px; margin-top:20px; filter: grayscale(100%) brightness(200%);">
