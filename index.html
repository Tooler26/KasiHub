<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasiHub | South Africa's Local Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --kasi-green: #2ecc71; 
            --kasi-dark: #0f0f0f; 
            --sidebar: #121212;
            --card: #1e1e1e;
        }

        body { 
            background: var(--kasi-dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
        }

        /* SIDEBAR */
        nav { 
            width: 260px; 
            height: 100vh; 
            background: var(--sidebar); 
            position: fixed; 
            border-right: 1px solid #222; 
            padding: 20px; 
            overflow-y: auto; 
            z-index: 100;
        }

        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 30px; 
            text-align: center;
            color: var(--kasi-green);
        }

        .nav-link { 
            padding: 12px 15px; 
            display: flex;
            align-items: center;
            color: #bbb; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            transition: 0.3s ease; 
            cursor: pointer;
        }

        .nav-link i { margin-right: 15px; width: 20px; text-align: center; }

        .nav-link:hover, .active { 
            background: var(--kasi-green); 
            color: black; 
            font-weight: bold;
        }

        .section-label { 
            font-size: 11px; 
            color: #555; 
            margin: 25px 0 10px 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        /* MAIN CONTENT */
        main { 
            margin-left: 260px; 
            width: calc(100% - 260px); 
            padding: 30px; 
        }

        .page-content { display: none; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GRID SYSTEM */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .v-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333;
            transition: 0.3s;
        }

        .v-card:hover { border-color: var(--kasi-green); }

        .thumb { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
        }

        .details { padding: 15px; }
        .kasi-badge { 
            font-size: 10px; 
            background: #333; 
            padding: 3px 8px; 
            border-radius: 4px; 
            color: var(--kasi-green);
        }

        button.primary-btn {
            background: var(--kasi-green);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 768px) {
            nav { width: 70px; padding: 10px; }
            nav span, .section-label, .logo span { display: none; }
            main { margin-left: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">KasiHub</div>
    
    <div class="nav-link active" onclick="showPage('home')"><i class="fa fa-home"></i> <span>Home</span></div>
    
    <div class="section-label">Active Kasies</div>
    <div id="kasi-tabs">
        <div class="nav-link">📍 <span>Parys</span></div>
        <div class="nav-link">📍 <span>De Deur</span></div>
    </div>

    <div class="section-label">Explore</div>
    <div class="nav-link" onclick="showPage('market')"><i class="fa fa-shopping-basket"></i> <span>Marketplace</span></div>
    <div class="nav-link" onclick="showPage('sports')"><i class="fa fa-football"></i> <span>Sports</span></div>
    <div class="nav-link" onclick="showPage('politics')"><i class="fa fa-landmark"></i> <span>Politics</span></div>
</nav>

<main>
    <section id="home" class="page-content active-page">
        <h1>Trending Now</h1>
        <div class="grid">
            <div class="v-card">
                <div class="thumb"><i class="fa fa-play fa-3x"></i></div>
                <div class="details">
                    <span class="kasi-badge">Trending</span>
                    <h4 style="margin:10px 0;">Welcome to KasiHub Platform</h4>
                    <p style="color:#777; font-size:13px;">Admin • 1 hour ago</p>
                </div>
            </div>
        </div>
    </section>

    <section id="market" class="page-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Kasi Marketplace</h1>
            <button class="primary-btn">+ Sell Item</button>
        </div>
        <div class="grid">
            <div class="v-card">
                <div class="thumb" style="background: #222;">ITEM IMAGE</div>
                <div class="details">
                    <span class="kasi-badge">Parys</span>
                    <h4 style="margin:5px 0;">Sample Product</h4>
                    <p style="color: var(--kasi-green); font-weight: bold;">R 00.00</p>
                </div>
            </div>
        </div>
    </section>

    <section id="sports" class="page-content">
        <h1>Local Sports News</h1>
        <p style="color: #888;">Coming soon: Local league scores.</p>
    </section>
</main>

    function showPage(pageId) {
        // Hide all

        // Show selected

        // Update sidebar links
