<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasiHub | The Ultimate Build</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --kasi-green: #2ecc71; --kasi-dark: #050505; --card: #121212; --blue-badge: #3ea6ff; --gold-badge: #f1c40f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #000; color: white; font-family: 'Roboto', sans-serif; }

        /* LOADER */
        #site-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        .loading-bar-container { width: 200px; background: #1a1a1a; height: 4px; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .loading-bar-fill { height: 100%; background: var(--kasi-green); width: 0%; transition: 0.1s linear; }

        /* AUTH POPUP - FIXED VISIBILITY */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9000; backdrop-filter: blur(10px); }
        .auth-card { background: #111; padding: 30px; border-radius: 20px; width: 350px; border: 1px solid #222; text-align: center; }
        .auth-input { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        
        /* APP LAYOUT */
        #main-site { display: none; width: 100%; height: 100vh; display: flex; opacity: 0; transition: 1s; }
        #main-site.loaded { display: flex !important; opacity: 1; }

        nav { width: 240px; background: #000; border-right: 1px solid #1a1a1a; padding: 15px; display: flex; flex-direction: column; }
        .nav-link { padding: 12px; display: flex; align-items: center; color: #f1f1f1; text-decoration: none; border-radius: 10px; margin-bottom: 5px; cursor: pointer; }
        .nav-link.active { background: #1a1a1a; color: var(--kasi-green); }

        main { flex-grow: 1; overflow-y: auto; padding: 20px 40px; background: #080808; }
        .page-content { display: none; max-width: 700px; margin: 0 auto; }
        .active-page { display: block !important; }

        .primary-btn { background: var(--kasi-green); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; }
        .secondary-btn { background: #222; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; width: 100%; font-size: 12px; }
        
        /* VIDEO FEED STYLES */
        .video-card { background: var(--card); border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #222; }
        video { width: 100%; display: block; background: #000; }
    </style>
</head>
<body>

<div id="site-loader">
    <h2 style="letter-spacing:4px;">KASI<span>HUB</span></h2>
    <div class="loading-bar-container"><div class="loading-bar-fill" id="load-progress"></div></div>
</div>

<div id="auth-overlay">
    <div class="auth-card" id="signup-box">
        <h3>Create Kasi Profile</h3>
        <button class="secondary-btn" onclick="getLocation()"><i class="fa fa-location-arrow"></i> Detect My Kasi (GPS)</button>
        <input type="text" id="reg-user" class="auth-input" placeholder="Display Name">
        <input type="email" id="reg-email" class="auth-input" placeholder="Email">
        <input type="password" id="reg-pass" class="auth-input" placeholder="Password">
        <input type="text" id="reg-kasi" class="auth-input" placeholder="Kasi Name (Detected automatically)">
        <button class="primary-btn" onclick="handleSignUp()">Sign Up</button>
        <p onclick="toggleAuth()" style="cursor:pointer; font-size:12px; margin-top:15px; color:var(--kasi-green);">Already have an account? Login</p>
    </div>
    <div class="auth-card" id="login-box" style="display:none;">
        <h3>Login</h3>
        <input type="email" id="login-email" class="auth-input" placeholder="Email">
        <input type="password" id="login-pass" class="auth-input" placeholder="Password">
        <button class="primary-btn" onclick="handleLogin()">Login</button>
        <p onclick="toggleAuth()" style="cursor:pointer; font-size:12px; margin-top:15px; color:var(--kasi-green);">New? Create Account</p>
    </div>
</div>

<div id="main-site">
    <nav>
        <div style="font-size: 20px; font-weight: 900; color: var(--kasi-green); margin-bottom: 30px;">KASIHUB</div>
        <div class="nav-link active" onclick="showPage('wall', this)"><i class="fa fa-home"></i> Wall</div>
        <div class="nav-link" onclick="showPage('studio', this)"><i class="fa fa-video"></i> Studio</div>
        <button onclick="logout()" class="secondary-btn" style="margin-top:auto;">Logout</button>
    </nav>

    <main>
        <section id="wall" class="page-content active-page">
            <h1>Kasi Wall</h1>
            <div id="kasi-feed"></div>
        </section>

        <section id="studio" class="page-content">
            <h1>Kasi Studio</h1>
            <div style="border: 2px dashed #333; padding: 40px; text-align: center; border-radius: 20px;">
                <i class="fa fa-cloud-upload-alt fa-3x" style="color:var(--kasi-green)"></i>
                <h3>Upload Video to KasiHub</h3>
                <input type="file" id="video-file" accept="video/*" style="display:none" onchange="uploadToCloudinary(this.files[0])">
                <button class="primary-btn" onclick="document.getElementById('video-file').click()" style="width:auto; margin-top:10px;">Select Video</button>
                <p id="upload-status" style="margin-top:10px; font-size:12px; color:#888;"></p>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://myxbhcherlhpoqmycxdj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15eGJoY2hlcmxocG9xbXljeGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzE0NDgsImV4cCI6MjA5MjI0NzQ0OH0.2pncYZ1fn4Nn1KrwAYUEYuevokTs2WxOcx_65u2_MHE';
    const CLOUDINARY_PRESET = 'PASTE_YOUR_CLOUDINARY_PRESET'; // From Cloudinary Settings
    const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/PASTE_YOUR_CLOUD_NAME/video/upload';

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    // 1. STARTUP & AUTH CHECK
    window.onload = function() {
        let bar = document.getElementById('load-progress'), w = 0;
        let id = setInterval(async () => {
            if (w >= 100) {
                clearInterval(id);
                const { data: { user } } = await _supabase.auth.getUser();
                document.getElementById('site-loader').style.display = 'none';
                if (user) {
                    const { data: p } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
                    currentUser = { ...user, ...p };
                    enterSite();
                } else {
                    document.getElementById('auth-overlay').style.display = 'flex';
                }
            } else { w++; bar.style.width = w + '%'; }
        }, 10);
    }

    // 2. GEOLOCATION - GETTING USER ADDRESS
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                const city = data.address.city || data.address.town || data.address.suburb || "Unknown Kasi";
                document.getElementById('reg-kasi').value = city;
                alert("Location Found: " + city);
            });
        }
    }

    // 3. CLOUDINARY UPLOAD LOGIC
    async function uploadToCloudinary(file) {
        if (!file) return;
        const status = document.getElementById('upload-status');
        status.innerText = "Uploading to Cloud... please wait.";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_PRESET);

        const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.secure_url) {
            status.innerText = "Upload Successful! Posting to wall...";
            // Save video link to Supabase
            await _supabase.from('posts').insert([{
                user_id: currentUser.id,
                username: currentUser.username,
                content: "Check out my new video!",
                video_url: data.secure_url,
                location: currentUser.kasi_location
            }]);
            location.reload();
        }
    }

    // 4. AUTH & NAVIGATION
    async function handleSignUp() {
        const email = document.getElementById('reg-email').value, pass = document.getElementById('reg-pass').value;
        const name = document.getElementById('reg-user').value, kasi = document.getElementById('reg-kasi').value;
        const { data, error } = await _supabase.auth.signUp({ email, password: pass });
        if(error) return alert(error.message);
        await _supabase.from('profiles').insert([{ id: data.user.id, username: name, kasi_location: kasi }]);
        alert("Account ready! Please log in.");
        location.reload();
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if(error) alert(error.message); else location.reload();
    }

    function enterSite() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-site').classList.add('loaded');
        loadPosts();
    }

    async function loadPosts() {
        const { data: posts } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
        const feed = document.getElementById('kasi-feed');
        feed.innerHTML = '';
        posts.forEach(p => {
            let media = p.video_url ? `<video controls><source src="${p.video_url}" type="video/mp4"></video>` : '';
            feed.innerHTML += `<div class="wall-post"><b>${p.username}</b> <small>${p.location}</small><p>${p.content}</p>${media}</div>`;
        });
    }

    function toggleAuth() {
        const s = document.getElementById('signup-box'), l = document.getElementById('login-box');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
        l.style.display = l.style.display === 'none' ? 'block' : 'none';
    }

    function showPage(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
